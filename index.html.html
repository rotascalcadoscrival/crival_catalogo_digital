<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crival · Catálogo Digital</title>
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <!-- Fonte Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000000;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .catalogo-container {
            max-width: 1300px;
            width: 100%;
            background: #0a0a0a;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(255,255,255,0.15);
            padding: 2rem 1rem 3rem 1rem;
            border: 1px solid #333;
        }
        .logo-area {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .logo-area img {
            max-width: 280px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(255,255,255,0.1));
        }
        .titulo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .titulo h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #ffffff;
            line-height: 1.3;
        }
        .swiper {
            width: 100%;
            padding: 0.5rem 0.2rem 2.5rem 0.2rem;
        }
        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            border-radius: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.8);
            transition: transform 0.2s;
            height: auto;
            padding: 1rem;
            border: 1px solid #2a2a2a;
        }
        .swiper-slide:hover {
            transform: scale(1.01);
            box-shadow: 0 12px 28px rgba(255,255,255,0.1);
        }
        .swiper-slide img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 320px;
            object-fit: contain;
            border-radius: 1.2rem;
            background: #111;
            transition: all 0.2s;
        }
        .slide-caption {
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #ddd;
            background: #222;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            display: inline-block;
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
            border: 1px solid #444;
        }
        .swiper-button-next, .swiper-button-prev {
            color: #ffffff;
            background: rgba(20,20,20,0.8);
            backdrop-filter: blur(4px);
            width: 2.8rem;
            height: 2.8rem;
            border-radius: 50%;
            box-shadow: 0 6px 14px rgba(0,0,0,0.7);
            transition: 0.2s;
            border: 1px solid #ffffff;
        }
        .swiper-button-next:after, .swiper-button-prev:after {
            font-size: 1.3rem;
            font-weight: bold;
        }
        .swiper-button-next:hover, .swiper-button-prev:hover {
            background: #ffffff;
            color: #000000;
        }
        .swiper-pagination-bullet {
            background: #666;
            opacity: 0.6;
        }
        .swiper-pagination-bullet-active {
            background: #ffffff;
            opacity: 1;
        }
        .info-extra {
            text-align: center;
            margin-top: 2rem;
            color: #aaa;
            font-size: 0.9rem;
        }
        .info-extra strong {
            color: #ffffff;
        }
        @media (max-width: 600px) {
            .titulo h1 { font-size: 1.6rem; }
            .swiper-slide img { max-height: 240px; }
        }
    </style>
</head>
<body>
    <div class="catalogo-container">
        <!-- Logo da Crival -->
        <div class="logo-area">
            <img src="Logo Crival.jpg" alt="Crival Calçados de Segurança" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div style="display: none; color: #fff; background: #000; padding: 10px 20px; border-radius: 8px; font-weight: bold; border:1px solid #fff;">CRIVAL</div>
        </div>

        <!-- Título -->
        <div class="titulo">
            <h1>CATÁLOGO DIGITAL CALÇADOS DE SEGURANÇA</h1>
        </div>

        <!-- Carrossel -->
        <div class="swiper mySwiper">
            <div class="swiper-wrapper"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-pagination"></div>
        </div>

        <div class="info-extra">
            ⚡ <strong>INFINITY • COMPOSITE</strong> • PVC • COURO • POLIURETANO • ELETRICISTA • BIDENSIDADE
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        (function() {
            const imagens = [
                { arquivo: "074LSCPT.jpg", descricao: "074LSCPT INFINITY · indicada para uso eletricista" },
                { arquivo: "080G.jpg", descricao: "080G INFINITY" },
                { arquivo: "090G.jpg", descricao: "090G INFINITY" },
                { arquivo: "092.png", descricao: "092 INFINITY · solado bidensidade · bico PVC · couro legítimo" },
                { arquivo: "092G.png", descricao: "092G INFINITY · conforto, qualidade e proteção" },
                { arquivo: "094.jpg", descricao: "094 INFINITY · conforto, qualidade e resistência" },
                { arquivo: "094G.jpg", descricao: "094G INFINITY · couro vaqueta · solado bidensidade · biqueira PVC" },
                { arquivo: "COMFORT.jpg", descricao: "COMFORT · calçado de poliuretano · solado não descola · 100% PU" },
                { arquivo: "CP074.png", descricao: "CP074 COMPOSITE · CRV74 · couro legítimo · biqueira composite" },
                { arquivo: "CP085.png", descricao: "CP085 COMPOSITE · proteja seus pés" }
            ];

            const wrapper = document.querySelector('.swiper-wrapper');
            if (!wrapper) return;

            imagens.forEach(item => {
                const slide = document.createElement('div');
                slide.className = 'swiper-slide';

                const figura = document.createElement('figure');
                figura.style.cssText = 'display: flex; flex-direction: column; align-items: center; width: 100%; margin: 0;';

                const img = document.createElement('img');
                img.src = item.arquivo;
                img.alt = item.descricao;
                img.loading = 'lazy';

                const legenda = document.createElement('figcaption');
                legenda.className = 'slide-caption';
                legenda.textContent = item.descricao;

                figura.appendChild(img);
                figura.appendChild(legenda);
                slide.appendChild(figura);
                wrapper.appendChild(slide);
            });

            new Swiper('.mySwiper', {
                slidesPerView: 1,
                spaceBetween: 20,
                loop: true,
                autoplay: {
                    delay: 3500,
                    disableOnInteraction: false,
                },
                pagination: {
                    el: '.swiper-pagination',
                    clickable: true,
                    dynamicBullets: true,
                },
                navigation: {
                    nextEl: '.swiper-button-next',
                    prevEl: '.swiper-button-prev',
                },
                breakpoints: {
                    480: { slidesPerView: 2, spaceBetween: 20 },
                    768: { slidesPerView: 3, spaceBetween: 24 },
                    1024: { slidesPerView: 4, spaceBetween: 28 },
                },
                speed: 600,
            });
        })();
    </script>
</body>
</html>
